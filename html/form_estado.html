<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/form.css" rel="stylesheet" type="text/css" media="screen"/>
</head>
<body>
    <button onclick="window.location='index.php?class=EstadoList'">
        <img src="img/back.png" style="width:24px; vertical-align: middle;">  Voltar
    </button>
    <form enctype="multipart/form-data" method="post" action="index.php?class=EstadoForm&method=save">
        <label>Código</label>
        <input name="id" readonly="1" type="text" style="width: 30%" value="{id}">
        <label>Nome</label>
        <input name="nome" type="text" style="width: 50%" value="{nome}">
        <label>Sigla</label>
        <input name="sigla" type="text" style="width: 25%" value="{sigla}">
        <input type="submit">
        
    </form>    
</body>
</html>
